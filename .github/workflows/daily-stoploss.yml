name: Daily stop-loss

# Checks the active position against its -10% stop after the US close on
# weekdays, regenerates the cockpit data, and commits. A breach turns the
# "Fast Ideas" tab dot red in the cockpit.
#
# The server knows the active position from web/data/watch.json — a committed,
# non-sensitive file (ticker + entry/stop price only, no shares or € amounts)
# emitted by build_site.py from the public monthly pick. Personal € amounts stay
# browser-only by design. On a breach (exit 1) we send a phone push via ntfy.sh
# if the NTFY_TOPIC secret is set; otherwise the breach just turns the cockpit
# dot red on the next build.

on:
  schedule:
    - cron: "30 21 * * 1-5"     # 21:30 UTC, Mon-Fri (after US market close)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Stop-loss check
        id: stop
        run: |
          set +e
          python track_b/daily_check.py --log-level INFO
          echo "code=$?" >> "$GITHUB_OUTPUT"   # 0 safe/none · 1 breach · 2 no price

      - name: Notify on breach
        if: steps.stop.outputs.code == '1'
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          if [ -z "${NTFY_TOPIC}" ]; then
            echo "No NTFY_TOPIC secret set — skipping push (cockpit dot still goes red)."
            exit 0
          fi
          curl -fsS \
            -H "Title: Stop-loss breached" \
            -H "Priority: urgent" \
            -H "Tags: rotating_light,chart_with_downwards_trend" \
            -d "A Track B stop-loss was breached today. Open the cockpit and rotate to cash." \
            "https://ntfy.sh/${NTFY_TOPIC}" && echo "Push sent via ntfy."

      - name: Build cockpit data
        run: python build_site.py

      - name: Commit cockpit update
        run: |
          git config user.name  "cockpit-bot"
          git config user.email "actions@users.noreply.github.com"
          git add web/data track_b/output 2>/dev/null || true
          git commit -m "chore: daily stop-loss check ($(date -u +%F))" || echo "no changes"
          git push
