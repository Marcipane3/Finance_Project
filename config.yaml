# Track B Fast Ideas configuration
#
# Edit these values to tune the system without changing code.

track_b:
  # Capital
  sleeve_eur: 2000.0

  # Mode: "single_monthly" (1 stock, 100% of sleeve, monthly cadence)
  #    or "ranked_biweekly" (5 stocks, rank-weighted, bi-weekly cadence)
  mode: single_monthly

  # Stop-loss as fraction of entry price (0.10 = -10%)
  stop_loss_pct: 0.10

  # Universe — which indices to include
  universe:
    sp500: true
    stoxx600: true
    nikkei225: true
    ftse100: true
    asx200: true
    min_adv_usd: 5000000   # filter out illiquid names

  # Pre-filter — reduce universe to ~50 candidates
  prefilter:
    top_n: 50
    weights:
      momentum_12_1: 0.30   # 12m return excluding most recent month
      momentum_1: 0.20      # last 1m return
      earnings_surprise: 0.20
      analyst_upgrade_30d: 0.15
      news_volume_30d: 0.15

  # Deep-dive — full enrichment per candidate
  deep_dive:
    top_n: 15
    weights:
      # technical (computed from closes, no API call)
      rsi_14: 0.08              # momentum strength
      price_vs_52w_high: 0.08   # proximity to highs = trend intact
      price_vs_ma50: 0.06       # trading above MA50
      realized_vol_30d: 0.00    # excluded from scoring; included in output for thesis writer
      # fundamental (from yfinance Ticker.info)
      revenue_growth: 0.18
      earnings_growth: 0.15
      forward_pe: 0.10          # inverted in code: lower PE = better score
      profit_margin: 0.10
      # analyst / sentiment
      analyst_upside: 0.15      # (target_price - price) / price
      analyst_rating: 0.10      # inverted in code: 1=buy = better score

  # LLM thesis writer
  thesis:
    # In single_monthly mode: 1 final pick gets a thesis
    # In ranked_biweekly mode: top 5 get theses
    model: claude-sonnet-4-6
    max_tokens_per_pick: 3500
    style: long_form   # short | medium | long_form

  # Output
  output:
    format: markdown
    save_to: track_b/output/reports/

track_a:
  initial_capital_eur: 23000
  new_capital_per_period_eur: 3000     # overridable via --new-capital CLI flag
  backtest_start: "2021-01-01"
  price_history_start: "2016-01-01"   # 5y before backtest start for MVN estimation

  universe: sp500

  fscore:
    threshold: 8
    min_stocks: 10          # lower threshold until this many pass

  returns:
    lookback_days: 1260     # 5 trading years
    n_simulations: 5000

  optimizer:
    beta: 0.10              # CVaR tail level
    k_min: 10               # minimum portfolio cardinality
    k_max: 30               # maximum portfolio cardinality
    w_min: 0.0304           # 3.04% ≈ €700 minimum position
    w_max: 0.10             # 10% maximum position
    tc_variable: 0.0045     # 0.20% commission + 0.25% FX margin
    solver_time_limit_s: 120

  a2:
    k_min_new: 1            # add at least 1 new stock
    k_max_new: 4            # add at most 4 new stocks with quarterly €3k

  mu0_sweep_annual: [0.0, 0.05, 0.10, 0.15, 0.20, 0.25, 0.30]
  cadences: [quarterly, yearly]

# Broker fee model (for honest performance reporting)
fees:
  broker: nordea_ask
  fixed_dkk_per_trade: 29.0
  variable_pct: 0.0020
  fx_margin_pct: 0.0025
  dkk_per_eur: 7.46
